
    <button  class="backButton" [routerLink]="['/lista']">
     <span class="material-icons">chevron_left</span>
      Voltar
    </button>


  <p *ngIf="notFound">Usuário não encontrado</p>
  <p *ngIf="loading">Carregando...</p>

  <div *ngIf="!notFound && !loading && user">
    <section class="infoHeader">
    <img class="photo" [src]="'https://ui-avatars.com/api/?name=' + user?.name" />
    <h1 class="userName"><span>{{ user?.username }}</span></h1>
  </section>

  <div class="infoContainer">
    <div class="infoItem">
      <strong>Nome:</strong>
      <p>{{ user?.name }}</p>
    </div>

    <div class="infoItem">
      <strong>Email:</strong>
      <p>{{ user?.email }}</p>
    </div>

    <div class="infoItem">
      <strong>Telefone:</strong>
      <p>{{ user?.phone }}</p>
    </div>

    <div class="infoItem">
      <strong>Cidade:</strong>
      <p>{{ user?.address?.city }}</p>
    </div>
    <div class="infoItem">
      <strong>Website:</strong>
      <p>{{ user?.website }}</p>
    </div>
    <div class="infoItem">
      <strong>Empresa:</strong>
      <p> {{user?.company?.name}} </p>
    </div>
  </div>

  </div>
