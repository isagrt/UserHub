<app-container>
  <section class="infoHeader">
    <img class="photo" [src]="'https://ui-avatars.com/api/?name=' + user?.name" />
    <h1 class="userName"><span>Username</span></h1>
  </section>
  <div class="infoContainer">
    <div class="infoItem">
      <strong>Nome:</strong>
      <p>{{ user?.name }}</p>
    </div>

    <div class="infoItem">
      <strong>Email:</strong>
      <p>{{ user?.email }}</p>
    </div>

    <div class="infoItem">
      <strong>Telefone:</strong>
      <p>{{ user?.phone }}</p>
    </div>

    <div class="infoItem">
      <strong>Cidade:</strong>
      <p>{{ user?.address?.city }}</p>
    </div>
    <div class="infoItem">
      <strong>Website:</strong>
      <p>{{ user?.website }}</p>
    </div>
    <div class="infoItem">
      <strong>Empresa:</strong>
      <p> oi </p>
    </div>
  </div>
</app-container>
