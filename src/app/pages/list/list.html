<app-container >
  <p>Lista de Usuários!</p>

  <input
  type="search"
  placeholder="Pesquisar usuário"
  [(ngModel)]="searchTerm">

  <p *ngIf="loading"> Carregando usuários... </p>
  <p *ngIf="error"> Erro ao carregar usuários </p>

  <div *ngIf="!loading && !error">
    <app-card
    *ngFor="let user of filteredUsers"
    [user]="user">
  </app-card>
  </div>

   <p class="unknownUser" *ngIf="filteredUsers.length === 0 && searchTerm">
    Usuário não encontrado
  </p>
</app-container>
